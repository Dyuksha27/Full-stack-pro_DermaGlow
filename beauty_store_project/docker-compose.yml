version: "3.8"

services:
  # 1. 🗄️ Your Existing Database Layer (Preserved & Untouched)
  postgres:
    image: postgres:15
    container_name: dermaglow-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345
      POSTGRES_DB: dermaglow
    ports:
      - "5434:5432" # Accessible on host port 5434
    volumes:
      - dermaglow_data:/var/lib/postgresql/data # Data persists securely
    networks:
      - dermaglow-network

  # 2. 🛡️ Backend API Gateway Container
  backend:
    build: ./backend
    container_name: dermaglow-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - DB_USER=postgres
      - DB_PASSWORD=12345
      - DB_HOST=postgres       # ◄── Crucial: Internal service name used inside Docker network
      - DB_PORT=5432           # ◄── Internal PG port (not host port 5434)
      - DB_NAME=dermaglow
      - JWT_ACCESS_SECRET=your_access_secret_here
      - JWT_REFRESH_SECRET=your_refresh_secret_here
      - STRIPE_SECRET_KEY=sk_test_your_key
      - CLOUDINARY_CLOUD_NAME=your_cloud_name
      - CLOUDINARY_API_KEY=your_api_key
      - CLOUDINARY_API_SECRET=your_api_secret
    depends_on:
      - postgres
    volumes:
      - ./backend:/app
      - /app/node_modules       # ◄── Prevents host overrides from wiping container binaries
    networks:
      - dermaglow-network

  # 3. 🧴 Frontend Portal UI Container
  frontend:
    build: ./frontend
    container_name: dermaglow-frontend
    restart: always
    ports:
      - "5173:5173"
    environment:
      - VITE_GOOGLE_CLIENT_ID=your_id.apps.googleusercontent.com
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - dermaglow-network

volumes:
  dermaglow_data: # Maintains data volume integrity safely

networks:
  dermaglow-network:
    name: dermaglow-network